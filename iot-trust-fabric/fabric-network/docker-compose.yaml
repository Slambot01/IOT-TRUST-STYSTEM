# =============================================================================
# docker-compose.yaml — IoT Trust Network Services
# =============================================================================
# Services:
#   ca.iot.example.com        — Fabric CA (port 7054)
#   orderer.iot.example.com   — Orderer (port 7050)
#   peer0.iot.example.com     — Peer (ports 7051, 7053)
#   couchdb0                  — CouchDB state database (port 5984)
#   cli                       — Fabric tools CLI container
#
# To verify CouchDB is working after startup:
#   curl http://admin:adminpw@localhost:5984/_all_dbs
# Expected output should include Fabric channel databases like:
#   ["_global_changes","_replicator","_users","iot-channel_","iot-channel_lifecycle"]
# =============================================================================

version: "3.7"

networks:
  iot-network:
    name: iot-network

volumes:
  orderer.iot.example.com:
  peer0.iot.example.com:
  couchdb0:

services:
  # ---------------------------------------------------------------------------
  # Fabric Certificate Authority
  # ---------------------------------------------------------------------------
  ca.iot.example.com:
    image: hyperledger/fabric-ca:1.5
    container_name: ca.iot.example.com
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca.iot.example.com
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      - FABRIC_CA_SERVER_TLS_CERTFILE=/etc/hyperledger/fabric-ca-server-config/ca.iot.example.com-cert.pem
      - FABRIC_CA_SERVER_TLS_KEYFILE=/etc/hyperledger/fabric-ca-server-config/priv_sk
      - FABRIC_CA_SERVER_PORT=7054
    ports:
      - "7054:7054"
    command: sh -c 'fabric-ca-server start -b admin:adminpw -d'
    volumes:
      - ./crypto-config/peerOrganizations/iot.example.com/ca/:/etc/hyperledger/fabric-ca-server-config
    networks:
      - iot-network

  # ---------------------------------------------------------------------------
  # Solo Orderer
  # ---------------------------------------------------------------------------
  orderer.iot.example.com:
    image: hyperledger/fabric-orderer:2.5
    container_name: orderer.iot.example.com
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_LISTENPORT=7050
      - ORDERER_GENERAL_LOCALMSPID=IoTOrdererMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/var/hyperledger/orderer/msp
      - ORDERER_GENERAL_GENESISMETHOD=file
      - ORDERER_GENERAL_GENESISFILE=/var/hyperledger/orderer/orderer.genesis.block
      - ORDERER_GENERAL_TLS_ENABLED=true
      - ORDERER_GENERAL_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_GENERAL_CLUSTER_CLIENTCERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_CLUSTER_CLIENTPRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_CLUSTER_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric
    command: orderer
    volumes:
      - ./channel-artifacts/genesis.block:/var/hyperledger/orderer/orderer.genesis.block
      - ./crypto-config/ordererOrganizations/iot.example.com/orderers/orderer.iot.example.com/msp:/var/hyperledger/orderer/msp
      - ./crypto-config/ordererOrganizations/iot.example.com/orderers/orderer.iot.example.com/tls:/var/hyperledger/orderer/tls
      - orderer.iot.example.com:/var/hyperledger/production/orderer
    ports:
      - "7050:7050"
    networks:
      - iot-network

  # ---------------------------------------------------------------------------
  # CouchDB State Database for Peer0
  # ---------------------------------------------------------------------------
  # CouchDB enables rich queries (selectors, indexes) on world state.
  # Verify CouchDB is working:
  #   curl http://admin:adminpw@localhost:5984/_all_dbs
  # Expected output includes the Fabric channel databases.
  couchdb0:
    image: couchdb:3.3
    container_name: couchdb0
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
    ports:
      - "5984:5984"
    volumes:
      - couchdb0:/opt/couchdb/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5984/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - iot-network

  # ---------------------------------------------------------------------------
  # Peer0 — IoTOrg
  # ---------------------------------------------------------------------------
  peer0.iot.example.com:
    image: hyperledger/fabric-peer:2.5
    container_name: peer0.iot.example.com
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=iot-network
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_PROFILE_ENABLED=false
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      # Peer identity
      - CORE_PEER_ID=peer0.iot.example.com
      - CORE_PEER_ADDRESS=peer0.iot.example.com:7051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_CHAINCODEADDRESS=peer0.iot.example.com:7052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
      # Gossip
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.iot.example.com:7051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.iot.example.com:7051
      - CORE_PEER_GOSSIP_USELEADERELECTION=true
      - CORE_PEER_GOSSIP_ORGLEADER=false
      # MSP
      - CORE_PEER_LOCALMSPID=IoTOrgMSP
      # CouchDB State Database Configuration
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb0:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
      # Chaincode
      - CORE_CHAINCODE_EXECUTETIMEOUT=300s
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: peer node start
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./crypto-config/peerOrganizations/iot.example.com/peers/peer0.iot.example.com/msp:/etc/hyperledger/fabric/msp
      - ./crypto-config/peerOrganizations/iot.example.com/peers/peer0.iot.example.com/tls:/etc/hyperledger/fabric/tls
      - peer0.iot.example.com:/var/hyperledger/production
    ports:
      - "7051:7051"
      - "7053:7053"
    depends_on:
      couchdb0:
        condition: service_healthy
    networks:
      - iot-network

  # ---------------------------------------------------------------------------
  # CLI — Admin operations container
  # ---------------------------------------------------------------------------
  cli:
    image: hyperledger/fabric-tools:2.5
    container_name: cli
    tty: true
    stdin_open: true
    environment:
      - GOPATH=/opt/gopath
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_ID=cli
      - CORE_PEER_ADDRESS=peer0.iot.example.com:7051
      - CORE_PEER_LOCALMSPID=IoTOrgMSP
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/iot.example.com/peers/peer0.iot.example.com/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/iot.example.com/peers/peer0.iot.example.com/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/iot.example.com/peers/peer0.iot.example.com/tls/ca.crt
      - CORE_PEER_MSPCONFIGPATH=/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/iot.example.com/users/Admin@iot.example.com/msp
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: /bin/bash
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ../chaincode/:/opt/gopath/src/github.com/hyperledger/fabric-samples/chaincode
      - ./crypto-config:/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto
      - ./channel-artifacts:/opt/gopath/src/github.com/hyperledger/fabric/peer/channel-artifacts
      - ./scripts:/opt/gopath/src/github.com/hyperledger/fabric/peer/scripts
    depends_on:
      - peer0.iot.example.com
    networks:
      - iot-network
